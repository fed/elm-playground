<!doctype html>
<html
  class="bg-slate-950 min-h-screen text-slate-100 flex items-center justify-center p-6"
>
  <head>
    <meta charset="UTF-8" />
    <title>Elm GitHub Profile Playground</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="w-full flex items-center justify-center">
    <div id="app" class="w-full"></div>
    <script src="app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        Elm.Main.init({
          node: document.getElementById("app"),
        });
      });
    </script>
  </body>
</html>
